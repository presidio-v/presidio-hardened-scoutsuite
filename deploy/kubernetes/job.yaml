# One-shot hardened audit. Runs the signed, multi-arch image (0.11) as the
# least-privilege workload-identity ServiceAccount (0.12), refuses long-lived
# keys, and fails the Job on danger-level findings (0.6) so it surfaces in
# cluster monitoring. Pin the image by digest in production.
apiVersion: batch/v1
kind: Job
metadata:
  name: presidio-scout-audit
  namespace: presidio-scout
  labels:
    app.kubernetes.io/name: presidio-scout
spec:
  backoffLimit: 1
  # Reap the Job (and its pod) an hour after it finishes.
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: presidio-scout
        # Required for Azure Workload Identity (no-op on AWS/GCP):
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: presidio-scout-auditor
      automountServiceAccountToken: false
      restartPolicy: Never
      # Pod-level hardening: never root, default seccomp profile.
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532    # distroless 'nonroot'
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: scout
          image: ghcr.io/presidio-v/presidio-hardened-scoutsuite:v0.27.0
          args:
            - aws
            - --report-dir
            - /report
            - --require-short-lived-creds
            - --fail-on-finding
            - danger
          # Container-level hardening: read-only root, no privilege escalation,
          # all Linux capabilities dropped.
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: report
              mountPath: /report
      volumes:
        # Writable scratch on an otherwise read-only rootfs. Swap 'report' for a
        # PVC (or add an uploader sidecar) if you need to keep the report.
        - name: tmp
          emptyDir: {}
        - name: report
          emptyDir: {}
