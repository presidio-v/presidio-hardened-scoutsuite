# Audit ServiceAccount — bound to a least-privilege cloud identity via workload
# identity (no long-lived keys; see 0.12 "keyless credentials" + iam/). Annotate
# for exactly one cloud:
#
#   AWS  (IRSA):            eks.amazonaws.com/role-arn
#   GCP  (Workload Id):     iam.gke.io/gcp-service-account
#   Azure (Workload Id):    azure.workload.identity/client-id  (+ pod label below)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: presidio-scout-auditor
  namespace: presidio-scout
  labels:
    app.kubernetes.io/name: presidio-scout
  annotations:
    # --- AWS IRSA ---
    eks.amazonaws.com/role-arn: arn:aws:iam::<ACCOUNT_ID>:role/presidio-scoutsuite-auditor
    # --- GCP Workload Identity (uncomment) ---
    # iam.gke.io/gcp-service-account: presidio-scout-auditor@<PROJECT>.iam.gserviceaccount.com
    # --- Azure Workload Identity (uncomment; also set the pod label) ---
    # azure.workload.identity/client-id: <CLIENT_ID>
# The audit pod talks only to the cloud control plane — it never needs to call
# the Kubernetes API, so don't hand it a usable API token by default.
automountServiceAccountToken: false
