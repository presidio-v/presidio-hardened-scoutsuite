name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  id-token: write  # required for OIDC trusted publishing
  contents: read   # required for actions/checkout

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest
    # Bind to a protected environment so a manual workflow_dispatch (or release)
    # publish to PyPI requires the reviewers/rules configured on the `pypi`
    # environment in repo settings before the OIDC token is issued.
    environment: pypi

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3

      - name: Publish only version tags
        run: |
          case "$GITHUB_REF" in
            refs/tags/v*) ;;
            *)
              echo "::error::PyPI publishing is only allowed from refs/tags/v*."
              exit 1
              ;;
          esac

      - name: Package version must match tag
        run: |
          python - <<'PY'
          import os
          import tomllib

          tag = os.environ["GITHUB_REF_NAME"]
          version = tomllib.loads(open("pyproject.toml", "rb").read().decode())["project"]["version"]
          if tag != f"v{version}":
              raise SystemExit(f"tag {tag!r} does not match project version v{version}")
          PY

      - name: requirements.lock must be hash-pinned
        run: |
          if ! grep -q -- '--hash=sha256:' requirements.lock; then
            echo "::error file=requirements.lock::refusing to publish: lockfile is not hash-pinned."
            exit 1
          fi

      - name: Verify package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          ruff check .
          ruff format --check .
          presidio-scout-validate --source manifest
          pytest --cov=presidio_scoutsuite --cov-report=term-missing --cov-fail-under=90

      - name: Build (reproducible)
        # Pin the build clock to the tagged commit's timestamp so the published
        # wheel/sdist are a deterministic function of the source — anyone can
        # rebuild from the same commit and confirm identical SHA-256 digests
        # (see the reproducible-build CI job and the README).
        run: |
          SOURCE_DATE_EPOCH="$(git log -1 --pretty=%ct)"
          export SOURCE_DATE_EPOCH
          echo "SOURCE_DATE_EPOCH=$SOURCE_DATE_EPOCH"
          uv build
          sha256sum dist/*

      - name: Publish
        run: uv publish
