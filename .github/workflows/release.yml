name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  # Hard gate: never publish an image whose dependency tree isn't hash-pinned.
  verify-lock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: requirements.lock must be hash-pinned
        run: |
          if ! grep -q -- '--hash=sha256:' requirements.lock; then
            echo "::error file=requirements.lock::refusing to release: lockfile" \
                 "is not hash-pinned."
            exit 1
          fi
      - name: Audit locked runtime dependencies
        run: |
          python -m pip install --upgrade pip "pip-audit==2.10.0"
          pip-audit -r requirements.lock --progress-spinner off

  # Hard gate: the curated baselines must reference rule names that the
  # actually-pinned ScoutSuite ships — not just the checked-in manifest. This
  # installs GPL ScoutSuite (release env only) and fails on any drift.
  verify-rulesets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install wrapper + pinned ScoutSuite
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[scoutsuite]"
      - name: Baselines must match the installed ScoutSuite rule inventory
        run: presidio-scout-validate --source installed

  image:
    needs: [verify-lock, verify-rulesets]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write       # keyless cosign signing / SLSA provenance
      attestations: write   # GitHub-signed build provenance (attest-build-provenance)
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    env:
      IMAGE: ghcr.io/${{ github.repository }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3
      - name: Pin the build clock (reproducible image timestamps)
        # buildkit rewrites layer/config timestamps to SOURCE_DATE_EPOCH, so the
        # same source rebuilds to the same digest regardless of when it ran.
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --pretty=%ct)" >> "$GITHUB_ENV"
      - name: Build and push (multi-arch, provenance + SBOM)
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.IMAGE }}:${{ github.ref_name }}
          provenance: mode=max
          sbom: true
      - name: Sign the image (keyless)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"
      - name: Attach signed SLSA build provenance
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
      - name: Generate the image SBOM (CycloneDX)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
          format: cyclonedx
          output: sbom.cdx.json
      - name: Attach signed SBOM attestation
        uses: actions/attest-sbom@10926c72720ffc3f7b666661c8e55b1344e2a365 # v2
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          sbom-path: sbom.cdx.json
          push-to-registry: true

  # Hard gate: independently re-verify the freshly published image end to end —
  # the cosign signature, then the SLSA provenance (cryptographically via gh,
  # then against this distribution's policy via presidio-scout-verify-provenance)
  # — before the release is considered good. A failure here marks the run red.
  verify-image:
    needs: [image]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      IMAGE: ghcr.io/${{ github.repository }}
      DIGEST: ${{ needs.image.outputs.digest }}
      IDENTITY: ^https://github.com/${{ github.repository }}/\.github/workflows/release\.yml@refs/tags/v
      ISSUER: https://token.actions.githubusercontent.com
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3
      - name: Install the wrapper (presidio-scout-verify-provenance)
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Verify the image signature (keyless)
        run: |
          cosign verify "${IMAGE}@${DIGEST}" \
            --certificate-identity-regexp "${IDENTITY}" \
            --certificate-oidc-issuer "${ISSUER}" > /dev/null
      - name: Verify build provenance, then enforce policy
        run: |
          # gh cryptographically verifies the GitHub-signed SLSA provenance;
          # presidio-scout-verify-provenance then checks it attests the expected
          # builder, source, and this exact image digest.
          gh attestation verify "oci://${IMAGE}@${DIGEST}" \
            --repo "${{ github.repository }}" --format json > provenance.json
          presidio-scout-verify-provenance provenance.json --digest "${DIGEST}"
      - name: Verify the signed SBOM attestation is present
        run: |
          gh attestation verify "oci://${IMAGE}@${DIGEST}" \
            --repo "${{ github.repository }}" \
            --predicate-type https://cyclonedx.org/bom > /dev/null
      - name: Scan the published image for vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE }}@${{ env.DIGEST }}
          scanners: vuln
          format: json
          output: trivy.json
          exit-code: "0" # our policy gate decides, not trivy
      - name: Enforce the vulnerability policy (fail on fixable critical)
        run: presidio-scout-vuln-gate trivy.json --fail-on critical --ignore-unfixed
