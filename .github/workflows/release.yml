name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  # Hard gate: never publish an image whose dependency tree isn't hash-pinned.
  verify-lock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: requirements.lock must be hash-pinned
        run: |
          if ! grep -q -- '--hash=sha256:' requirements.lock; then
            echo "::error file=requirements.lock::refusing to release: lockfile" \
                 "is not hash-pinned."
            exit 1
          fi

  image:
    needs: verify-lock
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write   # for keyless cosign signing / SLSA provenance
    env:
      IMAGE: ghcr.io/${{ github.repository }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: sigstore/cosign-installer@v3
      - name: Build and push (with provenance + SBOM attestation)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:${{ github.ref_name }}
          provenance: mode=max
          sbom: true
      - name: Sign the image (keyless)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"
