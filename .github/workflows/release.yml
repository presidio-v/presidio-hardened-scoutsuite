name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  # Hard gate: never publish an image whose dependency tree isn't hash-pinned.
  verify-lock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: requirements.lock must be hash-pinned
        run: |
          if ! grep -q -- '--hash=sha256:' requirements.lock; then
            echo "::error file=requirements.lock::refusing to release: lockfile" \
                 "is not hash-pinned."
            exit 1
          fi

  # Hard gate: the curated baselines must reference rule names that the
  # actually-pinned ScoutSuite ships — not just the checked-in manifest. This
  # installs GPL ScoutSuite (release env only) and fails on any drift.
  verify-rulesets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install wrapper + pinned ScoutSuite
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[scoutsuite]"
      - name: Baselines must match the installed ScoutSuite rule inventory
        run: presidio-scout-validate --source installed

  image:
    needs: [verify-lock, verify-rulesets]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write   # for keyless cosign signing / SLSA provenance
    env:
      IMAGE: ghcr.io/${{ github.repository }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3
      - name: Build and push (with provenance + SBOM attestation)
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:${{ github.ref_name }}
          provenance: mode=max
          sbom: true
      - name: Sign the image (keyless)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"
