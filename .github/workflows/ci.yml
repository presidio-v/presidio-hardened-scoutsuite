name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (wrapper + dev tools only; no GPL ScoutSuite)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: |
          ruff check .
          ruff format --check .
      - name: Validate curated baselines reference known rule names
        run: presidio-scout-validate --source manifest
      - name: Test
        run: pytest --cov=presidio_scoutsuite --cov-report=term-missing --cov-fail-under=90

  lockfile:
    # Advisory in CI; the hash-pin requirement is *enforced* (hard fail) in
    # release.yml, where unpinned deps would actually be redistributed.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Warn if requirements.lock is not hash-pinned
        run: |
          if ! grep -q -- '--hash=sha256:' requirements.lock; then
            echo "::warning file=requirements.lock::lockfile is not yet" \
                 "hash-pinned. Regenerate with pip-compile --generate-hashes" \
                 "before cutting a release (enforced in release.yml)."
          fi

  reproducible-build:
    # The wheel/sdist must be a deterministic function of the source: build
    # twice (in separate trees, with a fixed SOURCE_DATE_EPOCH) and require
    # byte-identical artifacts. A non-reproducible build defeats the point of
    # provenance — you couldn't independently rebuild and confirm what shipped.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Build twice and compare SHA-256 digests
        run: |
          python -m pip install --upgrade pip build
          # Pin the build clock so timestamps embedded in the archive are stable.
          export SOURCE_DATE_EPOCH=1700000000
          python -m build --outdir dist1 .
          python -m build --outdir dist2 .
          a=$(cd dist1 && sha256sum * | sort -k2)
          b=$(cd dist2 && sha256sum * | sort -k2)
          echo "$a"
          if [ "$a" != "$b" ]; then
            echo "::error::build is not reproducible — artifact digests differ"
            diff <(echo "$a") <(echo "$b") || true
            exit 1
          fi
          echo "reproducible: identical artifacts across two builds"
