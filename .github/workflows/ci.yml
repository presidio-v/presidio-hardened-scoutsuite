name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (wrapper + dev tools only; no GPL ScoutSuite)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: |
          ruff check .
          ruff format --check .
      - name: Test
        run: pytest --cov=presidio_scoutsuite --cov-report=term-missing --cov-fail-under=90

  lockfile:
    # Advisory in CI; the hash-pin requirement is *enforced* (hard fail) in
    # release.yml, where unpinned deps would actually be redistributed.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Warn if requirements.lock is not hash-pinned
        run: |
          if ! grep -q -- '--hash=sha256:' requirements.lock; then
            echo "::warning file=requirements.lock::lockfile is not yet" \
                 "hash-pinned. Regenerate with pip-compile --generate-hashes" \
                 "before cutting a release (enforced in release.yml)."
          fi
