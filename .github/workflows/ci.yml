name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (wrapper + dev tools only; no GPL ScoutSuite)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: |
          ruff check .
          ruff format --check .
      - name: Validate curated baselines reference known rule names
        run: presidio-scout-validate --source manifest
      - name: Test
        run: pytest --cov=presidio_scoutsuite --cov-report=term-missing --cov-fail-under=90

  lockfile:
    # Advisory in CI; the hash-pin requirement is *enforced* (hard fail) in
    # release.yml, where unpinned deps would actually be redistributed.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Warn if requirements.lock is not hash-pinned
        run: |
          if ! grep -q -- '--hash=sha256:' requirements.lock; then
            echo "::warning file=requirements.lock::lockfile is not yet" \
                 "hash-pinned. Regenerate with pip-compile --generate-hashes" \
                 "before cutting a release (enforced in release.yml)."
          fi

  reproducible-build:
    # The wheel/sdist must be a deterministic function of the source: build
    # twice (in separate trees, with a fixed SOURCE_DATE_EPOCH) and require
    # byte-identical artifacts. A non-reproducible build defeats the point of
    # provenance — you couldn't independently rebuild and confirm what shipped.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Build twice and compare artifact content
        run: |
          python -m pip install --upgrade pip build
          # Pin the build clock so file mtimes embedded in the archives are stable.
          export SOURCE_DATE_EPOCH=1700000000
          # Build into dirs OUTSIDE the checkout: hatchling's sdist sweeps in
          # untracked files, so an in-tree outdir would make the 2nd build ingest
          # the 1st build's artifacts and spuriously "differ".
          dist1="$(mktemp -d)"; dist2="$(mktemp -d)"
          python -m build --outdir "$dist1" .
          python -m build --outdir "$dist2" .
          # Wheels are zip archives normalized under SOURCE_DATE_EPOCH — compare
          # bytes directly. Sdists are gzip-wrapped, and the gzip *container*
          # carries an mtime that is not part of the archived content; per
          # reproducible-builds.org we compare the decompressed tar so the check
          # asserts true content reproducibility, not gzip-header determinism.
          digest() {
            sha256sum "$1"/*.whl | awk '{print "whl " $1}'
            for s in "$1"/*.tar.gz; do
              gzip -dc "$s" | sha256sum | awk '{print "sdist " $1}'
            done
          }
          a=$(digest "$dist1"); b=$(digest "$dist2")
          printf 'build 1:\n%s\nbuild 2:\n%s\n' "$a" "$b"
          if [ "$a" != "$b" ]; then
            echo "::error::build is not reproducible — artifact content differs"
            diff <(echo "$a") <(echo "$b") || true
            exit 1
          fi
          echo "reproducible: identical wheel bytes and sdist content across two builds"
