name: SBOM

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Build a CycloneDX SBOM of the full runtime tree
        run: |
          python -m venv /tmp/sbomenv
          . /tmp/sbomenv/bin/activate
          pip install --upgrade pip cyclonedx-bom
          # Resolve the pinned runtime tree (includes ScoutSuite) into the env.
          pip install --require-hashes -r requirements.lock || \
            pip install -r requirements.lock
          cyclonedx-py environment --output-format JSON --outfile sbom.cdx.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom
          path: sbom.cdx.json
